<!DOCTYPE html>
<html lang="nl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-09NZ773ZQT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-09NZ773ZQT');
    </script>
    <meta charset="UTF-8">
    <title>Hamytje</title>
</head>
<body>
    <h1>Welkom bij Hamytje</h1>

    <form id="contactFormulier">
    
        <label for="naam">Naam:</label><br>
        <input type="text" id="naam" required><br><br>
    
        <label for="email">E-mailadres:</label><br>
        <input type="email" id="email" required><br><br>
    
        <label for="bericht">Bericht:</label><br>
        <textarea id="bericht" required></textarea><br><br>
    
        <button type="submit">Open e-mailprogramma</button>
    </form>
    
    <script>
        document.getElementById("contactFormulier").addEventListener("submit", function(event) {
            // Dit stopt de standaard 405-foutveroorzakende actie van de browser
            event.preventDefault();
    
            // Gegevens uitlezen
            const naam = document.getElementById("naam").value;
            const email = document.getElementById("email").value;
            const bericht = document.getElementById("bericht").value;
    
            // Uw e-mailadres
            const naarEmailladres = "jasper.spittaels@gmail.com"; 
            
            // Onderwerp en inhoud samenstellen
            const onderwerp = encodeURIComponent("Nieuw bericht van " + naam);
            const emailInhoud = "Naam: " + naam + "\n" +
                                "E-mail: " + email + "\n\n" +
                                "Bericht:\n" + bericht;
                                
            const opgemaakteInhoud = encodeURIComponent(emailInhoud);
    
            // De mailto-link openen
            window.location.href = "mailto:" + naarEmailladres + "?subject=" + onderwerp + "&body=" + opgemaakteInhoud;
        });
    </script>
</body>
</html>
